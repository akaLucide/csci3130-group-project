# Try simplified version of pipeline that just runs the tests

image: eclipse-temurin:17-jdk-jammy

stages:
  - test

before_script:
  - chmod +x ./gradlew

unit_tests:
  stage: test
  script:
    - ./gradlew testDebugUnitTest
  artifacts:
    when: always
    reports:
      junit: app/build/test-results/testDebugUnitTest/*.xml